services:
  planka-server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: planka-dev
    pull_policy: never
    command: ["bash", "-c", "npm install && npm run db:init && npm start"]
    restart: on-failure
    volumes:
      - ./server:/app
    ports:
      - 1337:1337
    environment:
      BASE_URL: ${PLANKA_DEV_BASE_URL}
      DATABASE_URL: ${PLANKA_DEV_DATABASE_URL}
      SECRET_KEY: ${PLANKA_DEV_SECRET_KEY}

      # - LOG_LEVEL=warn

      # - TRUST_PROXY=true
      # - MAX_UPLOAD_FILE_SIZE=
      # - TOKEN_EXPIRES_IN=365 # In days

      # - STORAGE_LIMIT=
      # - ACTIVE_USERS_LIMIT=

      # related: https://github.com/knex/knex/issues/2354
      # As knex does not pass query parameters from the connection string,
      # we have to use environment variables in order to pass the desired values, e.g.
      # - PGSSLMODE=<value>

      # Configure knex to accept SSL certificates
      # - KNEX_REJECT_UNAUTHORIZED_SSL_CERTIFICATE=false

      # The default application language used as a fallback when a user's language is not set.
      # This language is also used for per-board notifications.
      DEFAULT_LANGUAGE: ${PLANKA_DEV_DEFAULT_LANGUAGE}

      # Set to true to show more detailed authentication error messages.
      # It should not be enabled without a rate limiter for security reasons.
      # - SHOW_DETAILED_AUTH_ERRORS=false

      # All outgoing HTTP requests (SMTP, webhooks, Apprise notifications, favicon fetching, etc.)
      # will be sent through this proxy if set.
      # - OUTGOING_PROXY=http://proxy:3128

      # Set to true to expose the Swagger specification at /swagger.json
      # - SWAGGER_EXPOSED=false

      # - S3_ENDPOINT=
      # - S3_REGION=
      # - S3_ACCESS_KEY_ID=
      # - S3_SECRET_ACCESS_KEY=
      # - S3_BUCKET=
      # - S3_FORCE_PATH_STYLE=true
      # - S3_REQUEST_CHECKSUM_CALCULATION=

      # - OIDC_ISSUER=
      # - OIDC_CLIENT_ID=
      # - OIDC_CLIENT_SECRET=
      # - OIDC_USE_OAUTH_CALLBACK=true
      # - OIDC_ID_TOKEN_SIGNED_RESPONSE_ALG=
      # - OIDC_USERINFO_SIGNED_RESPONSE_ALG=
      # - OIDC_SCOPES=openid email profile
      # - OIDC_RESPONSE_MODE=fragment
      # - OIDC_USE_DEFAULT_RESPONSE_MODE=true
      # - OIDC_ADMIN_ROLES=admin
      # - OIDC_PROJECT_OWNER_ROLES=project_owner
      # - OIDC_BOARD_USER_ROLES=board_user
      # - OIDC_CLAIMS_SOURCE=userinfo
      # - OIDC_EMAIL_ATTRIBUTE=email
      # - OIDC_NAME_ATTRIBUTE=name
      # - OIDC_USERNAME_ATTRIBUTE=preferred_username
      # - OIDC_ROLES_ATTRIBUTE=groups
      # - OIDC_IGNORE_USERNAME=true
      # - OIDC_IGNORE_ROLES=true
      # - OIDC_ENFORCED=true
      # - OIDC_TIMEOUT=3500
      # - OIDC_DEBUG=true

      # Default Planka administrator
      DEFAULT_ADMIN_EMAIL: ${PLANKA_DEFAULT_ADMIN_EMAIL}
      DEFAULT_ADMIN_PASSWORD: ${PLANKA_DEFAULT_ADMIN_PASSWORD}
      DEFAULT_ADMIN_NAME: ${PLANKA_DEFAULT_ADMIN_NAME}
      DEFAULT_ADMIN_USERNAME: ${PLANKA_DEFAULT_ADMIN_USERNAME}

      # Email Notifications (https://nodemailer.com/smtp/)
      # These values override and disable configuration in the UI if set.
      SMTP_HOST: ${PLANKA_SMTP_HOST}
      SMTP_PORT: ${PLANKA_SMTP_PORT}
      SMTP_NAME: ${PLANKA_SMTP_NAME}
      SMTP_SECURE: ${PLANKA_SMTP_SECURE}
      SMTP_TLS_REJECT_UNAUTHORIZED: ${PLANKA_SMTP_TLS_REJECT_UNAUTHORIZED}
      SMTP_USER: ${PLANKA_SMTP_USER}
      SMTP_PASSWORD: ${PLANKA_SMTP_PASSWORD}
      # Optionally store in secrets - then SMTP_PASSWORD should not be set
      # - SMTP_PASSWORD__FILE=/run/secrets/smtp_password
      SMTP_FROM: ${PLANKA_SMTP_FROM}

      # Using Gravatar directly exposes user IPs and hashed emails to a third party (GDPR risk).
      # Use a proxy you control for privacy, or leave commented out or empty to disable.
      # - GRAVATAR_BASE_URL=https://www.gravatar.com/avatar/
    depends_on:
      postgres:
        condition: service_healthy

  planka-client:
    image: planka-dev
    pull_policy: never
    command: ["bash", "-c", "npm install && npx vite --host"]
    restart: on-failure
    volumes:
      - ./client:/app
    ports:
      - 3000:3000
    environment:
      PROXY_TARGET: ${PLANKA_DEV_PROXY_TARGET}

  postgres:
    image: postgres:16-alpine
    restart: on-failure
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${PLANKA_DEV_POSTGRES_DB}
      POSTGRES_USER: ${PLANKA_DEV_POSTGRES_USER}
      POSTGRES_HOST_AUTH_METHOD: ${PLANKA_DEV_POSTGRES_HOST_AUTH_METHOD}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${PLANKA_DEV_POSTGRES_USER:-postgres} -d ${PLANKA_DEV_POSTGRES_DB:-planka} && psql -U ${PLANKA_DEV_POSTGRES_USER:-postgres} -d ${PLANKA_DEV_POSTGRES_DB:-planka} -c 'SELECT 1'",
        ]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 10s

volumes:
  db-data:
