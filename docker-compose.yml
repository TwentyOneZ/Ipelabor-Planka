version: '3.8'

services:
  # 1. SERVIÇO DE TUNELAMENTO SSH DEDICADO (Mantido, assumindo que é necessário para outro serviço)
  ssh_tunnel:
    build:
      context: .
      dockerfile: dockerfile.ssh
    container_name: ssh_tunnel_planka
    restart: unless-stopped
    # logging:
    #   driver: "none"

  planka:
    image: ghcr.io/plankanban/planka:2.0.0-rc.4
    restart: on-failure

    volumes:
      - favicons:/app/public/favicons
      - user-avatars:/app/public/user-avatars
      - background-images:/app/public/background-images
      - attachments:/app/private/attachments

    ports:
      - 7002:1337

    environment:
      - BASE_URL=http://example.com:7002

      # 🚀 MUDANÇA CRÍTICA: DATABASE_URL APONTANDO PARA O SERVIDOR EXTERNO
      # Formato: postgresql://user:password@host:port/database
      # Usando 'user', 'password', 'example.com', porta '7432' e 'planka' (BD padrão)
      - DATABASE_URL=postgresql://user:password@db.example.com:5432/planka

      - SECRET_KEY=change-me

      # 📝 Configuração de administrador padrão do Planka (Recomendado para primeiro acesso)
      - DEFAULT_ADMIN_EMAIL=admin@example.com
      - DEFAULT_ADMIN_PASSWORD=change-me
      - DEFAULT_ADMIN_NAME=Administrator
      - DEFAULT_ADMIN_USERNAME=admin
      # Outras configurações opcionais
      # - LOG_LEVEL=warn
      # ... (demais variáveis de ambiente comentadas)

    depends_on:
      ssh_tunnel:
        condition: service_started
      # 💥 DEPENDÊNCIA DO POSTGRES LOCAL REMOVIDA

      # Definição dos volumes para persistência de arquivos do Planka
volumes:
  favicons:
  user-avatars:
  background-images:
  attachments: # 💥 VOLUME 'db-data' REMOVIDO
